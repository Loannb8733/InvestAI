[tool.black]
line-length = 120
target-version = ["py311"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 120
src_paths = ["backend/app"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_strict_optional = true
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
exclude = ["backend/alembic/", "backend/tests/"]

[[tool.mypy.overrides]]
module = [
    "redis.*",
    "celery.*",
    "prophet.*",
    "xgboost.*",
    "pmdarima.*",
    "statsmodels.*",
    "optuna.*",
    "shap.*",
    "ta.*",
    "reportlab.*",
    "weasyprint.*",
    "openpyxl.*",
    "xlsxwriter.*",
    "aiohttp.*",
    "slowapi.*",
    "jose.*",
    "pyotp.*",
    "qrcode.*",
    "sentry_sdk.*",
]
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["backend/tests", "backend/alembic"]
skips = ["B101", "B110", "B112", "B301", "B324", "B403"]
