# Render Blueprint - InvestAI
# Deploy: https://render.com/deploy
#
# Stack gratuite :
#   - Backend API : Render Free Tier (web service)
#   - Base de données : Supabase PostgreSQL (externe, free tier)
#   - Redis : Upstash Redis (externe, free tier)
#   - Frontend : Vercel (free tier)

services:
  # Backend API
  - type: web
    name: investai-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Supabase PostgreSQL — use direct connection (port 5432), NOT pooler (6543)
      # Format: postgresql://postgres.[project-ref]:[password]@aws-0-eu-central-1.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false
      # Upstash Redis (free tier)
      # Format: rediss://default:[password]@[endpoint].upstash.io:6379
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: InvestAI
      - key: FERNET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # Celery Worker (requires Upstash Redis)
  - type: worker
    name: investai-worker
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    envVars:
      - fromGroup: investai-shared

  # Celery Beat (Scheduler)
  - type: worker
    name: investai-beat
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - fromGroup: investai-shared

# No Render database — using Supabase PostgreSQL (external, free tier)
# No Render Redis — using Upstash Redis (external, free tier)
