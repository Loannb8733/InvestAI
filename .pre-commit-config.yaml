repos:
  # ── Python: formatage ──
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--line-length=120]
        files: ^backend/
        exclude: ^backend/alembic/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]
        files: ^backend/
        exclude: ^backend/alembic/

  # ── Python: lint ──
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, "--extend-ignore=E402,E203,E712,W503,E501"]
        files: ^backend/(app|tests)/
        exclude: ^backend/alembic/

  # ── Sécurité: secrets & fichiers ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: no-commit-to-branch
        args: [--branch=main]

  # ── Sécurité: Python ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r]
        files: ^backend/app/
        exclude: ^backend/(tests|alembic)/
        additional_dependencies: ["bandit[toml]"]

  # ── Frontend: ESLint ──
  - repo: local
    hooks:
      - id: frontend-eslint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && ./node_modules/.bin/eslint --ext ts,tsx src/'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: Frontend TypeScript
        entry: bash -c 'cd frontend && ./node_modules/.bin/tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
