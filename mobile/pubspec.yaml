name: investai_mobile
description: InvestAI - Gestion d'investissements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2

  # Utils
  intl: ^0.20.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # Env
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  freezed: ^2.5.2
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
  # fonts:  # Uncomment and add Inter font files to assets/fonts/ to use custom fonts
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
